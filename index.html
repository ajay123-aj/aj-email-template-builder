<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags -->
    <title>AJ Email Template Builder – Create Beautiful Email Templates in Minutes</title>
    <meta name="title" content="AJ Email Template Builder – Create Beautiful Email Templates in Minutes" />
    <meta name="description" content="Free drag-and-drop email template builder. Create responsive HTML email templates without coding. Start from scratch or use pre-designed templates. Export and import HTML." />
    <meta name="keywords" content="email template builder, HTML email editor, drag and drop email designer, responsive email templates, email marketing, newsletter builder" />
    <meta name="author" content="AJ Email Editor" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://yourdomain.com/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yourdomain.com/" />
    <meta property="og:title" content="AJ Email Template Builder – Create Beautiful Email Templates" />
    <meta property="og:description" content="Free drag-and-drop email template builder. Create responsive HTML email templates without coding. Export and import HTML." />
    <meta property="og:image" content="https://yourdomain.com/og-image.png" />
    <meta property="og:locale" content="en_US" />
    <meta property="og:site_name" content="AJ Email Template Builder" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://yourdomain.com/" />
    <meta name="twitter:title" content="AJ Email Template Builder – Create Beautiful Email Templates" />
    <meta name="twitter:description" content="Free drag-and-drop email template builder. Create responsive HTML email templates without coding." />
    <meta name="twitter:image" content="https://yourdomain.com/og-image.png" />

    <!-- Theme & Mobile -->
    <meta name="theme-color" content="#0f172a" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- Structured Data (JSON-LD) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "AJ Email Template Builder",
      "description": "Free drag-and-drop email template builder. Create responsive HTML email templates without coding.",
      "applicationCategory": "DeveloperApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      }
    }
    </script>
  </head>
  <body>
    <script>
      (function () {
        try {
          var t = localStorage.getItem('aj-editor-theme');
          if (t === 'dark') document.documentElement.classList.add('dark');
          else document.documentElement.classList.remove('dark');
        } catch (e) {}
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
